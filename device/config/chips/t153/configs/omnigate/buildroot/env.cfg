
#kernel command arguments
earlyprintk=sunxi-uart,0x02600000
initcall_debug=0
console=ttyAS0,115200
nand_root=ubi0_4
mmc_root=/dev/mmcblk0p4
nor_root=/dev/mtdblock1
init=/init
loglevel=8
cma=8M
coherent_pool=16K
#reserve_list=30M@64M,78M@128M,200M@512M
mac=
wifi_mac=
bt_mac=
specialstr=
root_partition=rootfsA
mtd_name=sys
rootfstype=ubifs, rw
#rootfstype=squashfs
#set kernel cmdline if boot.img or recovery.img has no cmdline we will use this
setargs_nor=setenv bootargs ${root_partition} earlyprintk=${earlyprintk} clk_ignore_unused initcall_debug=${initcall_debug} console=${console} loglevel=${loglevel} root=${nor_root} rootwait init=${init} partitions=${partitions} cma=${cma} snum=${snum} coherent_pool=${coherent_pool} ion_carveout_list=${reserve_list}
setargs_nand=setenv bootargs  ${root_partition} earlyprintk=${earlyprintk} clk_ignore_unused initcall_debug=${initcall_debug} console=${console} loglevel=${loglevel}  ubi.mtd=${mtd_name} root=${nand_root} rootfstype=${rootfstype} rootwait init=${init} partitions=${partitions} cma=${cma} snum=${snum} mac_addr=${mac} wifi_mac=${wifi_mac} bt_mac=${bt_mac} selinux=${selinux} specialstr=${specialstr} coherent_pool=${coherent_pool} ion_carveout_list=${reserve_list}
setargs_nand_ubi=setenv bootargs  ${root_partition} ubi.mtd=${mtd_name} earlyprintk=${earlyprintk} clk_ignore_unused initcall_debug=${initcall_debug} console=${console} loglevel=${loglevel} root=${nand_root} rootfstype=${rootfstype} init=${init} partitions=${partitions} cma=${cma} snum=${snum} mac_addr=${mac} wifi_mac=${wifi_mac} bt_mac=${bt_mac} specialstr=${specialstr} gpt=1
setargs_mmc=setenv  bootargs  ${root_partition} earlyprintk=${earlyprintk} clk_ignore_unused initcall_debug=${initcall_debug} console=${console} loglevel=${loglevel} root=${mmc_root} rootwait init=${init} partitions=${partitions} cma=${cma} snum=${snum} mac_addr=${mac} wifi_mac=${wifi_mac} bt_mac=${bt_mac} selinux=${selinux} specialstr=${specialstr} coherent_pool=${coherent_pool} ion_carveout_list=${reserve_list} gpt=1
#nand command syntax: sunxi_flash read address partition_name read_bytes
#0x40007800 = 0x40008000(kernel entry) - 0x800(boot.img header 2k)
boot_partition=bootA
boot_normal=sunxi_flash read 0x40007800 ${boot_partition};bootm 0x40007800 ${sunxi_ramd_addr} ${sunxi_fdt_addr}
boot_recovery=sunxi_flash read 0x40007800 extend;bootm 0x40007800
boot_fastboot=fastboot
#recovery key
recovery_key_value_max=0x13
recovery_key_value_min=0x10
#fastboot key
fastboot_key_value_max=0x8
fastboot_key_value_min=0x2

#uboot system env config
bootdelay=0
#default bootcmd, will change at runtime according to key press
#default nand boot
#bootcmd=run setargs_nand boot_normal
#verify the kernel
verify=N

#sunxi_load_addr and sunxi_ramd_addr should be the same with boot_normal
sunxi_load_addr=0x40007800
sunxi_ramd_addr=0x40007800
sunxi_fdt_addr=
fdt_high=0xffffffff

#set kernel_start_blk and kernel_blk_count in uboot
kernel_start_blk=
kernel_blk_count=
#bootm kernel_add ramdisk_add fdt_addr; if no ramdisk ramdisk_addr set to "-";
boot_kernel=mmc read ${sunxi_load_addr} ${kernel_start_blk} ${kernel_blk_count};bootm ${sunxi_load_addr} ${sunxi_ramd_addr} ${sunxi_fdt_addr}
sunxicmd=run setargs_mmc
sunxi_pre_cmd=${sunxicmd};sunxi_update

preboot=sunxi_get_kern_env;sunxi_preboot
bootcmd=run sunxi_pre_cmd boot_normal
