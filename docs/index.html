<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OmniGate-T153 文档</title>
  <style>
    :root { color-scheme: light dark; --blue:#165dba; --line:#d8dee8; --panel:#f6f8fa; }
    @media (prefers-color-scheme:dark) {
      :root { --blue:#72a7ff; --line:#3b4655; --panel:#18202b; }
    }
    * { box-sizing:border-box; }
    body { margin:0; font:16px/1.75 system-ui,-apple-system,"Segoe UI","Noto Sans SC",sans-serif; }
    nav { position:fixed; inset:0 auto 0 0; width:250px; padding:28px 22px; border-right:1px solid var(--line); background:Canvas; overflow:auto; }
    nav strong { display:block; margin-bottom:20px; color:var(--blue); font-size:19px; }
    nav a { display:block; padding:6px 0; color:inherit; text-decoration:none; }
    nav a:hover { color:var(--blue); }
    main { max-width:1000px; margin-left:250px; padding:42px 7vw 90px; }
    h1 { font-size:2.3rem; line-height:1.25; }
    h2 { margin-top:2.4em; padding-bottom:.3em; border-bottom:1px solid var(--line); }
    h3 { margin-top:1.8em; }
    img { display:block; max-width:100%; max-height:760px; margin:22px auto; border-radius:10px; }
    table { width:100%; border-collapse:collapse; margin:18px 0; }
    th,td { padding:10px 13px; border:1px solid var(--line); text-align:left; }
    th { background:var(--panel); }
    blockquote { margin:20px 0; padding:12px 18px; border-left:4px solid var(--blue); background:var(--panel); }
    pre { padding:16px; overflow:auto; border-radius:8px; background:#111827; color:#e5e7eb; }
    code { font-family:ui-monospace,SFMono-Regular,Consolas,monospace; }
    :not(pre)>code { padding:.15em .35em; border-radius:4px; background:var(--panel); }
    a { color:var(--blue); }
    .error { padding:18px; border:1px solid #d33; border-radius:8px; }
    @media (max-width:760px) {
      nav { position:static; width:auto; border-right:0; border-bottom:1px solid var(--line); }
      main { margin:0; padding:24px 20px 60px; }
    }
  </style>
</head>
<body>
  <nav><strong>OmniGate-T153</strong><div id="toc">正在载入目录…</div></nav>
  <main id="content">正在载入文档…</main>
  <script>
    const esc = s => s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    const inline = s => esc(s)
      .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    function render(md) {
      const lines=md.replace(/\r/g,'').split('\n'), out=[]; let i=0, list=false;
      const closeList=()=>{ if(list){out.push('</ul>');list=false;} };
      while(i<lines.length){
        const l=lines[i];
        if(l.startsWith('```')){
          closeList(); const lang=l.slice(3), buf=[]; i++;
          while(i<lines.length&&!lines[i].startsWith('```')) buf.push(lines[i++]);
          out.push(`<pre><code class="language-${esc(lang)}">${esc(buf.join('\n'))}</code></pre>`); i++; continue;
        }
        if(l.startsWith('|') && i+1<lines.length && /^\|(?:\s*:?-+:?\s*\|)+$/.test(lines[i+1])){
          closeList(); const rows=[]; rows.push(l); i+=2;
          while(i<lines.length&&lines[i].startsWith('|')) rows.push(lines[i++]);
          const cells=r=>r.slice(1,-1).split('|').map(x=>inline(x.trim()));
          out.push('<table><thead><tr>'+cells(rows[0]).map(x=>`<th>${x}</th>`).join('')+'</tr></thead><tbody>');
          rows.slice(1).forEach(r=>out.push('<tr>'+cells(r).map(x=>`<td>${x}</td>`).join('')+'</tr>'));
          out.push('</tbody></table>'); continue;
        }
        const h=l.match(/^(#{1,3})\s+(.+)$/);
        if(h){ closeList(); const id=h[2].replace(/[^\w\u4e00-\u9fa5]+/g,'-').replace(/^-|-$/g,'');
          out.push(`<h${h[1].length} id="${id}">${inline(h[2])}</h${h[1].length}>`); i++; continue; }
        if(/^[-*]\s+/.test(l)){ if(!list){out.push('<ul>');list=true;} out.push(`<li>${inline(l.replace(/^[-*]\s+/,''))}</li>`);i++;continue; }
        closeList();
        if(l.startsWith('> ')){ out.push(`<blockquote>${inline(l.slice(2))}</blockquote>`);i++;continue; }
        if(!l.trim()){i++;continue;}
        const p=[l]; i++; while(i<lines.length&&lines[i].trim()&&!/^(#{1,3})\s|^[-*]\s|^```|^\|/.test(lines[i])) p.push(lines[i++]);
        out.push(`<p>${inline(p.join(' '))}</p>`);
      }
      closeList(); return out.join('\n');
    }
    fetch('./board-introduction.md').then(r=>{if(!r.ok)throw Error(r.statusText);return r.text()}).then(md=>{
      const content=document.querySelector('#content'); content.innerHTML=render(md);
      const heads=[...content.querySelectorAll('h2,h3')];
      document.querySelector('#toc').innerHTML=heads.map(h=>`<a href="#${h.id}" style="padding-left:${h.tagName==='H3'?16:0}px">${h.textContent}</a>`).join('');
    }).catch(e=>document.querySelector('#content').innerHTML=`<div class="error">文档载入失败：${esc(e.message)}。请通过 <code>scripts/preview_docs.sh</code> 启动预览，不要直接双击 HTML 文件。</div>`);
  </script>
</body>
</html>
